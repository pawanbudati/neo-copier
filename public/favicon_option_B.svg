<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#10b981" flood-opacity="0.3"/>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <!-- Master bar -->
    <rect x="64" y="64" width="48" height="140" rx="16" fill="url(#emeraldGrad)"/>
    <!-- Slave bar -->
    <rect x="144" y="96" width="48" height="108" rx="16" fill="url(#indigoGrad)"/>
    <!-- Replicating connection arc -->
    <path d="M 112 100 C 130 80, 130 110, 144 110" stroke="#ffffff" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.7"/>
    <!-- Ascending trend arrow -->
    <path d="M 48 180 L 100 130 L 150 160 L 208 90" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="208,76 212,100 196,92" fill="#ffffff"/>
  </g>
</svg>
