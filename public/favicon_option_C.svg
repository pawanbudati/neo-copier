<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>
    <linearGradient id="magentaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0844"/>
      <stop offset="100%" stop-color="#ffb199"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#00f2fe" flood-opacity="0.3"/>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <!-- Infinity loop (Interlocking) -->
    <!-- Left Loop (Master) -->
    <path d="M 128 128 C 96 90, 48 90, 48 128 C 48 166, 96 166, 128 128" fill="none" stroke="url(#cyanGrad)" stroke-width="16" stroke-linecap="round"/>
    <!-- Right Loop (Slave) -->
    <path d="M 128 128 C 160 166, 208 166, 208 128 C 208 90, 160 90, 128 128" fill="none" stroke="url(#magentaGrad)" stroke-width="16" stroke-linecap="round" opacity="0.85"/>
    <!-- Copy nodes at intersections -->
    <circle cx="128" cy="128" r="10" fill="#ffffff" filter="drop-shadow(0 0 4px #00f2fe)"/>
  </g>
</svg>
