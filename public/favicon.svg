<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium radial gradients for background and glows -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/> <!-- Teal 400 -->
      <stop offset="100%" stop-color="#0d9488"/> <!-- Teal 600 -->
    </linearGradient>

    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/> <!-- Sky 400 -->
      <stop offset="100%" stop-color="#0284c7"/> <!-- Sky 600 -->
    </linearGradient>

    <!-- Drop shadow filter for 3D depth and premium aesthetic -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#2dd4bf" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background circle/shield -->
  <rect width="512" height="512" rx="128" fill="url(#bgGlow)"/>
  
  <g filter="url(#glow)">
    <!-- Overlapping sheets (indicating copying / replicating) -->
    <!-- Slave sheet (Replicated/Secondary) -->
    <rect x="140" y="190" width="180" height="180" rx="32" fill="url(#secondaryGrad)" opacity="0.6"/>
    
    <!-- Connection lines/nodes indicating copying -->
    <path d="M 280 240 L 330 240 C 350 240, 350 290, 370 290" stroke="#06b6d4" stroke-width="8" stroke-dasharray="2 4" fill="none" opacity="0.5"/>

    <!-- Master sheet (Source/Primary) -->
    <rect x="192" y="142" width="180" height="180" rx="32" fill="url(#primaryGrad)"/>

    <!-- Lightning / Replicator icon inside the master sheet -->
    <!-- Represents high speed copier / execution -->
    <path d="M 290 190 L 250 240 L 280 240 L 260 280 L 310 230 L 280 230 Z" fill="#ffffff" />
  </g>
  
  <!-- Outer glowing accent ring -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="#334155" stroke-width="4" opacity="0.4"/>
</svg>
