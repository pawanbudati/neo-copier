<svg xmlns="http://www.w3.org/2000/svg" viewBox="40 40 176 176" width="100%" height="100%">
  <style>
    :root {
      --glow-color: #00f2fe;
      --glow-opacity: 0.35;
      --teal-start: #00f2fe;
      --teal-end: #4facfe;
      --purple-start: #f355da;
      --purple-end: #7000ff;
      --node-color: #ffffff;
      --node-glow: #00f2fe;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --glow-color: #5b21b6;
        --glow-opacity: 0.25;
        --teal-start: #0891b2;
        --teal-end: #0369a1;
        --purple-start: #a21caf;
        --purple-end: #6b21a8;
        --node-color: #0891b2;
        --node-glow: #6b21a8;
      }
    }
    .c-path {
      stroke: url(#neonPurple);
      stroke-width: 16;
      stroke-linecap: round;
      opacity: 0.9;
    }
    .n-path {
      stroke: url(#neonTeal);
      stroke-width: 18;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .center-node {
      fill: var(--node-color);
      filter: drop-shadow(0 0 4px var(--node-glow));
    }
  </style>
  <defs>
    <!-- Premium Neon Gradients -->
    <linearGradient id="neonTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--teal-start)"/>
      <stop offset="100%" stop-color="var(--teal-end)"/>
    </linearGradient>

    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--purple-start)"/>
      <stop offset="100%" stop-color="var(--purple-end)"/>
    </linearGradient>
    
    <!-- Neon Drop Shadow Glow -->
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="var(--glow-color)" flood-opacity="var(--glow-opacity)"/>
    </filter>
  </defs>

  <g filter="url(#neonGlow)">
    <!-- Letter C (Copier) -->
    <path class="c-path" d="M 190 76 C 114 76 104 100 104 128 C 104 156 114 180 190 180" fill="none"/>
    
    <!-- Link Indicator -->
    <circle class="center-node" cx="118" cy="128" r="7"/>

    <!-- Letter N (Neo) -->
    <path class="n-path" d="M 72 180 L 72 76 L 138 180 L 138 76" fill="none"/>
  </g>
</svg>
